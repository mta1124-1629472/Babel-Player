name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BabelPlayer.sln

      - name: Build
        run: dotnet build BabelPlayer.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/BabelPlayer.App.Tests/BabelPlayer.App.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
