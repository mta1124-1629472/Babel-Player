name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x

      - name: Build and test via NUKE
        shell: pwsh
        run: |
          ./build.ps1 ValidateNativeAssets Compile Test --configuration Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            artifacts/test-results/*.trx
            **/TestResults/*.trx
          if-no-files-found: ignore
