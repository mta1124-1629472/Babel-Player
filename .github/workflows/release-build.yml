name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-winui:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BabelPlayer.sln

      - name: Publish WinUI app
        run: dotnet publish src/BabelPlayer.WinUI/BabelPlayer.WinUI.csproj --configuration Release --runtime win-x64 --self-contained false

      - name: Upload WinUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabelPlayer-WinUI-win-x64
          path: src/BabelPlayer.WinUI/bin/x64/Release/net8.0-windows10.0.22621.0/win-x64/publish/
          if-no-files-found: error
