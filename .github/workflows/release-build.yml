name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-avalonia:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runtime: win-x64
            suffix: win-x64
            nuke_target: ReleaseRuntimeWinX64
          - runtime: win-arm64
            suffix: win-arm64
            nuke_target: ReleaseRuntimeWinArm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x

      - name: Resolve release version tokens
        id: version
        shell: pwsh
        run: |
          $rawVersion = if ("${{ github.ref }}".StartsWith("refs/tags/")) { "${{ github.ref_name }}" } else { "${{ github.sha }}" }
          $releaseVersion = if ($rawVersion.StartsWith("v")) { $rawVersion.Substring(1) } else { $rawVersion }

          "raw_version=$rawVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build release artifacts via NUKE
        shell: pwsh
        run: |
          ./build.ps1 ${{ matrix.nuke_target }} --configuration Release --release-version ${{ steps.version.outputs.raw_version }}

      - name: Resolve NUKE artifact paths
        id: artifacts
        shell: pwsh
        run: |
          $archivePath = Join-Path "${{ github.workspace }}\artifacts" "BabelPlayer-${{ steps.version.outputs.raw_version }}-portable-${{ matrix.suffix }}.zip"
          $installerPath = Join-Path "${{ github.workspace }}\artifacts" "BabelPlayer-${{ steps.version.outputs.raw_version }}-setup-${{ matrix.suffix }}.exe"

          if (-not (Test-Path $archivePath)) {
            throw "Expected archive artifact not found: $archivePath"
          }

          if (-not (Test-Path $installerPath)) {
            throw "Expected installer artifact not found: $installerPath"
          }

          "archive_path=$archivePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "installer_path=$installerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabelPlayer-portable-${{ matrix.suffix }}
          path: ${{ steps.artifacts.outputs.archive_path }}
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BabelPlayer-setup-${{ matrix.suffix }}
          path: ${{ steps.artifacts.outputs.installer_path }}
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $archive = "${{ steps.artifacts.outputs.archive_path }}"
          $installer = "${{ steps.artifacts.outputs.installer_path }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $archive $installer --clobber
          }
          else {
            gh release create $tag $archive $installer --generate-notes --title $tag
          }
