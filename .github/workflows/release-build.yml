name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-winui:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BabelPlayer.sln

      - name: Publish WinUI app
        run: dotnet publish src/BabelPlayer.WinUI/BabelPlayer.WinUI.csproj --configuration Release --runtime win-x64 --self-contained false

      - name: Package release archive
        shell: pwsh
        run: |
          $publishDir = "src/BabelPlayer.WinUI/bin/Release/net8.0-windows10.0.22621.0/win-x64/publish"
          $version = if ("${{ github.ref }}".StartsWith("refs/tags/")) { "${{ github.ref_name }}" } else { "${{ github.sha }}" }
          $archiveDir = "artifacts"
          $archivePath = Join-Path $archiveDir "BabelPlayer-WinUI-$version-win-x64.zip"

          New-Item -ItemType Directory -Path $archiveDir -Force | Out-Null
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $archivePath
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload WinUI artifact
        uses: actions/upload-artifact@v6
        with:
          name: BabelPlayer-WinUI-win-x64
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ env.ARCHIVE_PATH }}" --generate-notes --title "${{ github.ref_name }}"
