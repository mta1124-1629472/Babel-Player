name: Format Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  dotnet-format:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: |
          dotnet restore src/BabelPlayer.Avalonia/BabelPlayer.Avalonia.csproj
          dotnet restore tests/BabelPlayer.App.Tests/BabelPlayer.App.Tests.csproj

      - name: Verify formatting
        run: |
          dotnet format src/BabelPlayer.Avalonia/BabelPlayer.Avalonia.csproj --verify-no-changes --no-restore
          dotnet format tests/BabelPlayer.App.Tests/BabelPlayer.App.Tests.csproj --verify-no-changes --no-restore
